<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="100%">
  <rect width="860" height="200" fill="#0d0d0d"/>

  <!-- hojas izquierda -->
  <ellipse cx="0" cy="60" rx="90" ry="30" fill="#1a2e1a" transform="rotate(-30 0 60)"/>
  <ellipse cx="20" cy="40" rx="70" ry="22" fill="#162414" transform="rotate(-20 20 40)"/>
  <ellipse cx="-10" cy="100" rx="100" ry="28" fill="#1e341e" transform="rotate(-40 -10 100)"/>
  <ellipse cx="60" cy="20" rx="80" ry="20" fill="#152013" transform="rotate(-15 60 20)"/>
  <ellipse cx="30" cy="140" rx="90" ry="25" fill="#1a2e1a" transform="rotate(-50 30 140)"/>
  <ellipse cx="80" cy="170" rx="70" ry="18" fill="#172918" transform="rotate(-35 80 170)"/>
  <ellipse cx="120" cy="80" rx="60" ry="16" fill="#1c301c" transform="rotate(-25 120 80)"/>

  <!-- hojas derecha -->
  <ellipse cx="860" cy="60" rx="90" ry="30" fill="#1a2e1a" transform="rotate(30 860 60)"/>
  <ellipse cx="840" cy="40" rx="70" ry="22" fill="#162414" transform="rotate(20 840 40)"/>
  <ellipse cx="870" cy="100" rx="100" ry="28" fill="#1e341e" transform="rotate(40 870 100)"/>
  <ellipse cx="800" cy="20" rx="80" ry="20" fill="#152013" transform="rotate(15 800 20)"/>
  <ellipse cx="830" cy="140" rx="90" ry="25" fill="#1a2e1a" transform="rotate(50 830 140)"/>
  <ellipse cx="780" cy="170" rx="70" ry="18" fill="#172918" transform="rotate(35 780 170)"/>
  <ellipse cx="740" cy="80" rx="60" ry="16" fill="#1c301c" transform="rotate(25 740 80)"/>

  <!-- velo central -->
  <rect x="150" y="0" width="560" height="200" fill="#0d0d0d" opacity="0.55"/>

  <!-- RΞVO con parpadeo neon -->
  <text x="430" y="105" text-anchor="middle" font-family="'Courier New', monospace" font-size="72" font-weight="bold" letter-spacing="14" fill="#ffffff">
    RΞV0
    <animate attributeName="opacity" values="1;0.75;1;0.85;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- subtítulo pulsante -->
  <text x="430" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="5" fill="#aaaaaa">
    ÚNETE A NUESTRA COMUNIDAD
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>
